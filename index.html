<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>Gestion périmés pharmacie</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 24px;
    }

    button {
      width: 100%;
      padding: 18px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: #1976d2;
      color: white;
      font-size: 18px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    .date-row {
      margin-top: 10px;
    }

    video {
      width: 100%;
      margin-top: 15px;
      border-radius: 12px;
      background: black;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Gestion périmés</h1>

<button id="scanBtn">
  Scanner produit
</button>

<video id="video"
       autoplay
       playsinline>
</video>

<input id="product"
       placeholder="Nom produit">

<input id="comment"
       placeholder="Commentaire / labo">

<div id="dates"></div>

<button id="addDateBtn">
  + Ajouter une date
</button>

<button id="saveBtn">
  Enregistrer
</button>

<div id="status"></div>

<script>

let stream = null;
let scannedCode = "";

const statusEl = document.getElementById("status");
const video = document.getElementById("video");

document
  .getElementById("scanBtn")
  .addEventListener("click", startScanner);

document
  .getElementById("addDateBtn")
  .addEventListener("click", addDateField);

document
  .getElementById("saveBtn")
  .addEventListener("click", saveProduct);

function addDateField(value = "") {

  const div = document.createElement("div");

  div.className = "date-row";

  div.innerHTML = `
    <input class="date"
           placeholder="MM-YYYY"
           value="${value}">
  `;

  document
    .getElementById("dates")
    .appendChild(div);
}

addDateField();

async function startScanner() {

  try {

    statusEl.innerText =
      "Demande autorisation caméra...";

    stream =
      await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: {
            ideal: "environment"
          }
        }
      });

    video.srcObject = stream;

    statusEl.innerText =
      "Caméra active";

    if (!("BarcodeDetector" in window)) {

      statusEl.innerText =
        "BarcodeDetector non supporté";

      return;
    }

    const detector =
      new BarcodeDetector({
        formats: [
          "ean_13",
          "qr_code",
          "data_matrix"
        ]
      });

    scanLoop(detector);

  } catch (err) {

    console.error(err);

    statusEl.innerText =
      "Erreur caméra : " + err.message;
  }
}

async function scanLoop(detector) {

  const interval = setInterval(async () => {

    try {

      const codes = await detector.detect(video);

      if (codes.length > 0) {

        const raw = codes[0].rawValue;
        const format = codes[0].format || "unknown";

        const parsed = parseDataMatrix(raw);

        const gtin = parsed.gtin;
        const cip13 = gtin && gtin.startsWith("0")
          ? gtin.substring(1)
          : gtin;

        console.log({ raw, parsed, gtin, cip13 });

        // STOP SCAN
        clearInterval(interval);
        stopScanner();

        scannedCode = cip13 || gtin;

        statusEl.innerText =
          "🔍 CODE DÉTECTÉ\n\n" +
          "GTIN : " + gtin + "\n" +
          "CIP13 : " + cip13 + "\n" +
          "Expiry : " + (parsed.expiry || "N/A") + "\n\n" +
          "📡 Recherche produit...";

        loadCachedProduct({
          gtin: gtin,
          cip13: cip13
        });
      }

    } catch (e) {

      statusEl.innerText =
        "Erreur scan : " + e.message;
    }

  }, 500);
}

function stopScanner() {

  if (stream) {

    stream
      .getTracks()
      .forEach(track => track.stop());
  }
}

function parseDataMatrix(raw) {

  let gtin = null;
  let expiry = null;
  let lot = null;

  let i = 0;

  while (i < raw.length) {

    const ai = raw.substring(i, i + 2);

    // GTIN
    if (ai === "01") {
      gtin = raw.substring(i + 2, i + 16);
      i += 16;
      continue;
    }

    // EXPIRY
    if (ai === "17") {
      expiry = raw.substring(i + 2, i + 8);
      i += 8;
      continue;
    }

    // LOT (corrigé proprement)
    if (ai === "10") {

      let start = i + 2;
      let j = start;

      while (j < raw.length) {

        const nextAI = raw.substring(j, j + 2);

        if (nextAI === "17" || nextAI === "01" || nextAI === "21") {
          break;
        }

        j++;
      }

      lot = raw.substring(start, j);
      i = j;
      continue;
    }

    i++;
  }

  return { gtin, expiry, lot };
}

async function loadCachedProduct(data) {

  try {

    const code = data.cip13 || data.gtin;

    statusEl.innerText =
      "📡 Recherche produit...\nCode: " + code;

    const url =
      "https://script.google.com/macros/s/AKfycbxZ5m14RBhlFUmD3lawaJiVswIcwW92rFIGmO6QtOk8mG5GMb0MuU353idWe-DbWc4Z/exec?action=lookup&code=" +
      encodeURIComponent(code);

    const response = await fetch(url);
    const result = await response.json();

    console.log("CACHE RESULT:", result);

    // ✅ CAS 1 : CACHE OK
    if (result && result.found) {

      document.getElementById("product").value =
        result.product || "";

      document.getElementById("comment").value =
        result.comment || "";

      if (result.expiry) {
        fillExpiry(result.expiry);
      }

      statusEl.innerText = "✔ Produit trouvé (cache)";
      return;
    }

    // ❌ CAS 2 : VIDAL fallback
    statusEl.innerText = "🔎 Recherche Vidal...";

    const vidalUrl =
      "https://script.google.com/macros/s/AKfycbxZ5m14RBhlFUmD3lawaJiVswIcwW92rFIGmO6QtOk8mG5GMb0MuU353idWe-DbWc4Z/exec?action=vidal&code=" +
      encodeURIComponent(code);

    const vidalRes = await fetch(vidalUrl);
    const vidalData = await vidalRes.json();

    console.log("VIDAL RESULT:", vidalData);

    if (vidalData && vidalData.found) {

      document.getElementById("product").value =
        vidalData.product || "";

      statusEl.innerText = "✔ Produit trouvé (Vidal)";
      return;

    }

    // ❌ CAS 3 : RIEN TROUVÉ
    statusEl.innerText =
      "❌ Produit inconnu";

  } catch (err) {

    console.error(err);

    statusEl.innerText =
      "❌ Erreur recherche: " + err.message;
  }
}

function fillExpiry(expiry) {

  // format GS1 : YYMMDD
  const yy = expiry.substring(0,2);
  const mm = expiry.substring(2,4);

  const year = "20" + yy;

  addDateField(mm + "-" + year);
}

function saveProduct() {

  const dates =
    Array
      .from(document.querySelectorAll(".date"))
      .map(el => el.value)
      .filter(Boolean);

  const payload = {

    code: scannedCode,

    product:
      document
        .getElementById("product")
        .value,

    comment:
      document
        .getElementById("comment")
        .value,

    dates
  };

  console.log(payload);

  statusEl.innerText =
    "Produit prêt à envoyer";
}

</script>

</body>
</html>
