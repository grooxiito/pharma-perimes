<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestion périmés</title>

<style>
body {
  font-family: Arial;
  max-width: 520px;
  margin: auto;
  padding: 16px;
  background: #f5f5f5;
}

h1 {
  font-size: 22px;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #1976d2;
  color: white;
  font-size: 16px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

video {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
  background: black;
}

#status {
  margin-top: 12px;
  font-weight: bold;
}

#debug {
  background: #111;
  color: #0f0;
  font-size: 11px;
  padding: 10px;
  margin-top: 15px;
  height: 200px;
  overflow: auto;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>📦 Gestion périmés</h1>

<button id="scanBtn">Scanner produit</button>

<video id="video" autoplay playsinline></video>

<input id="product" placeholder="Nom produit">
<input id="comment" placeholder="Commentaire">

<div id="dates"></div>

<button id="addDate">+ Ajouter date</button>
<button id="saveBtn">Enregistrer</button>

<div id="status"></div>
<pre id="debug"></pre>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbyEUlA2Af9mLCXZMenT910LgWbyA19MgdIhN09QKtQ6fVGj24ul_D85XGx36J2pUqm3/exec";

let stream;
let scannedCode = "";

const elStatus = document.getElementById("status");
const elDebug = document.getElementById("debug");

function log(...a) {
  elDebug.textContent += "\n" + a.map(x =>
    typeof x === "object" ? JSON.stringify(x) : x
  ).join(" ");
}

document.getElementById("scanBtn").onclick = startScan;
document.getElementById("addDate").onclick = () => addDate();
document.getElementById("saveBtn").onclick = save;

addDate();

function addDate(value = "") {
  const d = document.createElement("input");
  d.className = "date";
  d.placeholder = "MM-YYYY";
  d.value = value;
  document.getElementById("dates").appendChild(d);
}

async function startScan() {

  elStatus.textContent = "Autorisation caméra...";

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  document.getElementById("video").srcObject = stream;

  const detector = new BarcodeDetector({
    formats: ["ean_13", "data_matrix", "qr_code"]
  });

  elStatus.textContent = "Scan actif";

  const interval = setInterval(async () => {

    const codes = await detector.detect(document.getElementById("video"));

    if (!codes.length) return;

    clearInterval(interval);
    stop();

    const raw = codes[0].rawValue;

    log("RAW", raw);

    const gtin = extractGTIN(raw);
    const cip13 = gtin?.startsWith("0") ? gtin.slice(1) : gtin;

    scannedCode = cip13;

    elStatus.textContent =
      "Code détecté: " + cip13;

    await lookup(cip13);
  }, 400);
}

function stop() {
  stream?.getTracks().forEach(t => t.stop());
}

function extractGTIN(raw) {
  const m = raw.match(/01(\d{14})/);
  return m ? m[1] : raw;
}

async function lookup(code) {

  if (!code) {
    log("CODE NULL OR UNDEFINED");
    elStatus.textContent = "Code invalide";
    return;
  }
  
  try {

    elStatus.textContent = "Recherche...";

    log("CODE SENT:", code);
    
    const res = await fetch(
      BASE_URL + "&action=lookup&code=" + code
    );

    const text = await res.text();
    log("LOOKUP RAW:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      log("LOOKUP JSON ERROR:", e.message);
      elStatus.textContent = "Backend invalide (lookup)";
      return;
    }

    log("CACHE", data);

    if (data.found) {
      fill(data.product);
      return;
    }

    const enrichRes = await fetch(
      BASE_URL + "&action=enrich&code=" + code
    );

    const enrichText = await enrichRes.text();
    log("ENRICH RAW:", enrichText);

    let e;
    try {
      e = JSON.parse(enrichText);
    } catch (err) {
      log("ENRICH JSON ERROR:", err.message);
      elStatus.textContent = "Backend invalide (enrich)";
      return;
    }

    log("ENRICH", e);

    if (e.found) {
      fill(e.product);

      await fetch(
        BASE_URL +
        "&action=saveCache&cip=" + code +
        "&product=" + encodeURIComponent(e.product)
      );

      return;
    }

    elStatus.textContent = "Produit inconnu";

  } catch (err) {

    console.error("FATAL ERROR OBJECT:", err);
  
    log("FATAL ERROR NAME:", err?.name);
    log("FATAL ERROR MESSAGE:", err?.message);
    log("FATAL ERROR STACK:", err?.stack);
  
    elStatus.textContent =
      "Erreur: " + (err?.message || "inconnue");
  }
}

function fill(name) {
  document.getElementById("product").value = name;
  elStatus.textContent = "OK produit chargé";
}

function save() {

  const dates = [...document.querySelectorAll(".date")]
    .map(x => x.value)
    .filter(Boolean);

  log({
    code: scannedCode,
    product: product.value,
    comment: comment.value,
    dates
  });

  elStatus.textContent = "Enregistré (mock)";
}

function json(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}

</script>

</body>
</html>
