<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestion périmés</title>

<style>
body {
  font-family: Arial;
  max-width: 520px;
  margin: auto;
  padding: 16px;
  background: #f5f5f5;
}

h1 {
  font-size: 22px;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #1976d2;
  color: white;
  font-size: 16px;
}

input {
  width: 90%;
  padding: 16px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

video {
  width: 100%;
  /*margin-top: 10px;*/
  border-radius: 10px;
  background: black;
  max-height:220px;
  object-fit:cover;
}

.expired {
  background:#ffebee;
  color:#c62828;
  border:2px solid #c62828;
  padding:10px;

}

#expiredWarning {
  display:none;

  border:2px solid #c62828;

  text-align:center;
}
  
#status {
  margin-top: 12px;
  font-weight: bold;
}

#debug {
  background: #111;
  color: #0f0;
  font-size: 11px;
  padding: 10px;
  margin-top: 15px;
  height: 200px;
  overflow: auto;
  border-radius: 10px;
}

#videoContainer {
  position: relative;
  width: 100%;
  margin-top: 10px;
  display: none;
}
  
#scanOverlay {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 130px;
  height: 130px;
  transform: translate(-50%, -50%);
  border: 3px solid #00ff88;
  border-radius: 16px;
  pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
  display: none;
}

.dateWrapper {
  margin-top: 10px;
}

.dateWarning {
  margin-top: 4px;
  padding: 8px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: bold;
  display: none;
}
  
</style>
</head>

<body>

<h1>📦 Gestion périmés</h1>

<button id="scanBtn">Scanner produit</button>

<button
  id="hardScanBtn"
  style="display:none;background:#d32f2f;">
  ⚠️ Datamatrix difficile
</button>

<!--<video id="video" autoplay playsinline></video>-->
<div id="videoContainer">
  <video id="video" autoplay playsinline></video>
  <div id="scanOverlay"></div>
</div>

<div id="expiredWarning" style="display:none;">
  ⛔ PRODUIT PÉRIMÉ
</div>
  
<input id="product" placeholder="Nom produit">
<input id="comment" placeholder="Commentaire">

<div id="dates"></div>

<button id="addDate">+ Ajouter date</button>
<button id="saveBtn">Enregistrer</button>
  
<div id="status"></div>
<pre id="debug"></pre>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>

// url Apps Script à changer à chaque déploiement
const BASE_URL = "https://script.google.com/macros/s/AKfycbwkwkuC2M-pNoKrRaVwEkmojJutJ9jGaGzfywNyZ1lK4PGvLJUOMo8xGmlHksTZBTLn/exec";

let cisMap = {};
let cipMap = {};

let stream;
let scannedCode = "";
let productExpired = false;
let codeReader;

let hardScanTimeout;
let currentControls = null;
let activeStream = null;
let hardScanRunning = false;
let hardScanStopTimeout = null;

const elStatus = document.getElementById("status");
const elDebug = document.getElementById("debug");

function log(...a) {
  elDebug.textContent += "\n" + a.map(x =>
    typeof x === "object" ? JSON.stringify(x) : x
  ).join(" ");
}

async function loadBdpm() {

  log("Chargement BDPM...");

  // fichier présentations
  const cipTxt =
    await fetch("CIS_CIP_bdpm.txt")
      .then(r => r.text());

  // fichier spécialités
  const cisTxt =
    await fetch("CIS_bdpm.txt")
      .then(r => r.text());

  // CIP13 -> CIS
  cipTxt.split("\n").forEach(line => {

    const cols = line.trim().split("\t");

    if (cols.length < 7) return;

    const cis = cols[0];
    const cip13 = cols[6];

    cipMap[cip13] = cis;
  });

  // CIS -> DENOMINATION
  cisTxt.split("\n").forEach(line => {

    const cols = line.trim().split("\t");

    if (cols.length < 2) return;

    const cis = cols[0];
    const denomination = cols[1];

    cisMap[cis] = denomination;
  });

  log("CIP chargés :", Object.keys(cipMap).length);
  log("CIS chargés :", Object.keys(cisMap).length);
}

document.getElementById("scanBtn").onclick = startScan;
document.getElementById("hardScanBtn").onclick = startHardScan;
document.getElementById("addDate").onclick = () => addDate();
document.getElementById("saveBtn").onclick = save;

document.addEventListener(
  "visibilitychange",
  () => {
    if (document.hidden) {
      log("PAGE HIDDEN -> STOP CAMERA");
      stop();
    }
  }
);

loadBdpm();

function resetForm() {

  productExpired = false;

  document.getElementById("product").value = "";
  document.getElementById("comment").value = "";

  document.getElementById("dates").innerHTML = "";

  document.getElementById("saveBtn").disabled = false;

  document.getElementById("saveBtn").style.display =
    "block";

  document.getElementById("expiredWarning")
    .style.display = "none";
}

function findDrugByCip(cip13) {

  log("Recherche CIP13 :", cip13);

  const cis = cipMap[cip13];

  log("CIS trouvé :", cis);

  if (!cis) {
    return null;
  }

  const denomination = cisMap[cis];

  log("Dénomination :", denomination);

  return denomination || null;
}

// ancienne avant test péremptions proches  
function addDate00(value = "") {
  const d = document.createElement("input");
  d.className = "date";
  d.placeholder = "MM-YYYY";
  d.value = value;
  document.getElementById("dates").appendChild(d);
}

// nouvelle fonction addDate
function addDate(value = "") {

  const wrapper =
    document.createElement("div");

  wrapper.className =
    "dateWrapper";

  const input =
    document.createElement("input");

  input.className = "date";

  input.placeholder = "MM-YYYY";

  input.value = value;

  const warning =
    document.createElement("div");

  warning.className =
    "dateWarning";

  input.addEventListener(
    "input",
    updateExpiryState
  );

  wrapper.appendChild(input);

  wrapper.appendChild(warning);

  document
    .getElementById("dates")
    .appendChild(wrapper);

  // IMPORTANT : recalcul immédiat
  setTimeout(updateExpiryState, 0);
}

function isExpired(mmYYYY) {

  const [month, year] =
    mmYYYY.split("-").map(Number);

  const now = new Date();

  const currentMonth =
    now.getMonth() + 1;

  const currentYear =
    now.getFullYear();

  return (
    year < currentYear ||
    (
      year === currentYear &&
      month <= currentMonth
    )
  );
}

// analyse des dates de péremption en fonction de la date actuelle
function updateExpiryState() {

  const saveBtn =
    document.getElementById(
      "saveBtn"
    );

  const now = new Date();

  const currentMonth =
    now.getMonth() + 1;

  const currentYear =
    now.getFullYear();

  const currentDay =
    now.getDate();

  // après le 20 :
  // on décale les seuils
  const offset =
    currentDay > 20 ? 1 : 0;

  let blockSave = false;

  document
    .querySelectorAll(".dateWrapper")
    .forEach(wrapper => {

      const input =
        wrapper.querySelector(".date");

      const warning =
        wrapper.querySelector(
          ".dateWarning"
        );

      const value =
        input.value.trim();

      warning.style.display = "none";

      input.style.background = "";

      if (!value) return;

      const [month, year] =
        value.split("-").map(Number);

      const diffMonths =
        (
          (year - currentYear) * 12
        ) +
        (
          month - currentMonth
        );

      // ROUGE
      if (diffMonths <= offset) {

        input.style.background =
          "#ffb3b3";

        warning.style.display =
          "block";

        warning.style.background =
          "#ff4d4d";

        warning.style.color =
          "white";

        warning.textContent =
          "⛔ Produit périmé ou trop proche";

        blockSave = true;

        return;
      }

      // ORANGE
      if (
        diffMonths === offset + 1
      ) {

        input.style.background =
          "#ffd699";

        warning.style.display =
          "block";

        warning.style.background =
          "#ff9900";

        warning.style.color =
          "white";

        warning.textContent =
          "⚠️ Produit bientôt périmé : à mettre de côté";

        blockSave = true;

        return;
      }

      // JAUNE
      if (
        diffMonths === offset + 2
      ) {

        input.style.background =
          "#fff1a8";

        warning.style.display =
          "block";

        warning.style.background =
          "#ffe066";

        warning.style.color =
          "black";

        warning.textContent =
          "⚠️ Produit date courte";

        return;
      }
    });

  saveBtn.disabled = blockSave;
}

// scan avec ZXing pour meilleure compatibilité
async function startScan() {

  console.log("ZXing object:", ZXing);
  console.log("ZXing keys:", Object.keys(ZXing || {}));

  document.getElementById("hardScanBtn").style.display = "none";

  try {

    resetForm();

    elStatus.textContent = "Ouverture caméra...";

    const video =
      document.getElementById("video");
    
    codeReader =
      new ZXing.BrowserMultiFormatReader();

    currentControls =
      await codeReader.decodeFromVideoDevice(
      null,
      "video",
      (result, err) => {

        if (result) {

          clearTimeout(hardScanTimeout);

          document.getElementById("hardScanBtn")
            .style.display = "none";
          
          const raw =
            result.getText();

          log("RAW", raw);

          codeReader.reset();
          stop();

          handleScanResult(raw);
        }

        if (err && !(err instanceof ZXing.NotFoundException)) {
          log("ZXING ERROR DETAIL", err);
        }
      }
    );

    activeStream = video.srcObject;

    document.getElementById("videoContainer")
      .style.display = "block";
    
    document.getElementById("scanOverlay")
      .style.display = "block";

    elStatus.textContent = "Scan actif";
    
    hardScanTimeout = setTimeout(() => {
      document.getElementById("hardScanBtn")
        .style.display = "block";
    }, 11000);

  } catch (err) {
  
    console.log("ZXING ERROR GLOBAL FULL OBJECT:", err);
  
    alert(
      "ZXING ERROR: " +
      (err?.message || err)
    );
  
    elStatus.textContent = "Erreur caméra ZXing";
  }
}

async function startHardScan() {

  stop();
  hardScanRunning = true;

  try {

    resetForm();

    document.getElementById("videoContainer")
      .style.display = "block";
    
    document.getElementById("scanOverlay")
      .style.display = "block";

    elStatus.textContent =
      "Mode scan robuste...";

    hardScanStopTimeout =
      setTimeout(() => {
    
        if (hardScanRunning) {
    
          log("HARD SCAN TIMEOUT");
    
          stop();
    
          hardScanRunning = false;
    
          elStatus.textContent =
            "Aucun code détecté";
    
          document.getElementById("hardScanBtn")
            .style.display = "block";
        }
    
      }, 15000);

    document.getElementById("hardScanBtn")
      .style.display = "none";

    const hints = new Map();

    hints.set(
      ZXing.DecodeHintType.TRY_HARDER,
      true
    );

    hints.set(
      ZXing.DecodeHintType.POSSIBLE_FORMATS,
      [ZXing.BarcodeFormat.DATA_MATRIX]
    );

    codeReader =
      new ZXing.BrowserMultiFormatReader(
        hints
      );

    currentControls =
      await codeReader.decodeFromVideoDevice(
      null,
      "video",
      (result, err) => {

        if (result) {

          hardScanRunning = false;

          clearTimeout(hardScanStopTimeout);
          
          const raw =
            result.getText();

          log("RAW HARD", raw);

          stop();

          handleScanResult(raw);
        }
      }
    );
    
    activeStream =
      document.getElementById("video")
        .srcObject;

  } catch (err) {

    log("HARD SCAN ERROR", err);

    elStatus.textContent =
      "Erreur scan robuste";
  }
}

async function handleScanResult(raw) {

  const expiryMatch =
    raw.match(/17(\d{6})/);

  if (expiryMatch) {

    const expiry =
      expiryMatch[1];

    const yy =
      expiry.substring(0, 2);

    const mm =
      expiry.substring(2, 4);

    document.getElementById("dates")
      .innerHTML = "";

    addDate(
      mm + "-20" + yy
    );

    updateExpiryState();

    log("EXPIRY", expiry);
  }

  const gtin =
    extractGTIN(raw);

  const cip13 =
    gtin?.startsWith("0")
      ? gtin.slice(1)
      : gtin;

  scannedCode = cip13;

  log("CIP13", cip13);

  await lookup(cip13);
}

// avec BarcodeDetector OK - avant passage ZXing  
async function startScanBarcodeDetector() {

  elStatus.textContent = "Autorisation caméra...";

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  document.getElementById("video").srcObject = stream;

  const detector = new BarcodeDetector({
    formats: ["ean_13", "data_matrix", "qr_code"]
  });

  elStatus.textContent = "Scan actif";

  const interval = setInterval(async () => {

    const codes = await detector.detect(document.getElementById("video"));

    if (!codes.length) return;

    clearInterval(interval);
    stop();
    resetForm();

    const raw = codes[0].rawValue;

    const expiryMatch =
      raw.match(/17(\d{6})/);
    
    if (expiryMatch) {
    
      const expiry = expiryMatch[1];
    
      const yy = expiry.substring(0,2);
      const mm = expiry.substring(2,4);
    
      document.getElementById("dates").innerHTML = "";

      addDate(mm + "-20" + yy);

      const expiryDate =
        mm + "-20" + yy;
      
      productExpired =
        isExpired(expiryDate);
      
      document.getElementById("saveBtn")
        .disabled = productExpired;

      document.getElementById("saveBtn")
        .style.display =
          productExpired
            ? "none"
            : "block";
      
      document.getElementById("expiredWarning")
        .style.display =
          productExpired
            ? "block"
            : "none";
    
      log("EXPIRY :", expiry);
    }

    log("RAW", raw);

    const gtin = extractGTIN(raw);
    const cip13 = gtin?.startsWith("0") ? gtin.slice(1) : gtin;

    scannedCode = cip13;

    elStatus.textContent =
      "Code détecté: " + cip13;

    await lookup(cip13);
  }, 400);
}

// nouveau stop pour ZXing + tryHarder
function stop() {

  log("STOP CAMERA");

  // arrêt du hardScan
  hardScanRunning = false;

  clearTimeout(hardScanStopTimeout);

  try {

    clearTimeout(hardScanTimeout);

  } catch(e) {}

  try {

    currentControls?.stop();

  } catch(e) {}

  try {

    codeReader?.reset();

  } catch(e) {}

  try {

    if (activeStream) {

      activeStream
        .getTracks()
        .forEach(track => {

          track.stop();

          log(
            "TRACK STOPPED",
            track.kind
          );
        });

      activeStream = null;
    }

  } catch(e) {

    log("STREAM STOP ERROR", e);
  }

  try {

    const video =
      document.getElementById("video");

    video.pause();

    video.srcObject = null;

    video.removeAttribute("src");

    video.load();

  } catch(e) {}

  log("CAMERA FULLY STOPPED");
  codeReader = null;
  currentControls = null;

  document.getElementById("scanOverlay")
    .style.display = "none";
  
  document.getElementById("videoContainer")
    .style.display = "none";
  
  log("ACTIVE STREAM TRACKS",activeStream?.getTracks()?.length);
  activeStream?.getTracks()
  .forEach(track => {

    log(
      "TRACK STATE",
      track.readyState
    );

    track.stop();
  });
  
}

function extractGTIN(raw) {
  const m = raw.match(/01(\d{14})/);
  return m ? m[1] : raw;
}

// ancienne OK sauf vidal
async function lookup00(code) {

  try {

    log("=== LOOKUP LOCAL ===");

    let product = findDrugByCip(code);
    const cis = cipMap[code];

    // fallback cache serveur si BDPM KO
    if (!product) {

      try {

        const res = await fetch(
          BASE_URL +
          "?action=lookupCache&cip=" + encodeURIComponent(code)
        );

        const json = await res.json();

        if (json.found) {
          product = json.product;
        }

      } catch (e) {
        log("CACHE LOOKUP ERROR", e);
      }
    }

    // fallback VIDAL si BDPM + CACHE KO
    if (!product) {
    
      try {
    
        log("LOOKUP VIDAL");
    
        const res = await fetch(
          BASE_URL +
          "?action=lookupVidal&cip=" +
          encodeURIComponent(code)
        );
    
        const json = await res.json();
    
        if (json.found) {
    
          product = json.product;
    
          log("VIDAL FOUND", {
            product: product,
            url: json.url
          });
    
        } else {
    
          log("VIDAL NOT FOUND");
        }
    
      } catch (e) {
    
        log("VIDAL ERROR", e);
      }
    }

    const shortName00 =
      product
        ? product.split(", ")[0].trim()
        : "";

    const shortName =
      product.replace(/,\s[^,]+$/, "");

    // UNE SEULE SOURCE UI (important)
    if (shortName) {
      document.getElementById("product").value = shortName;
    }

    elStatus.textContent =
      shortName ? "Produit trouvé" : "Produit inconnu";

    log("SCAN RESULT", {
      cip: code,
      cis,
      product: shortName
    });

    return;

  } catch (err) {

    log("ERROR", err);
    elStatus.textContent = "Erreur scan";
  }
}

// nouvelle TEST ok 26-05
async function lookup(code) {

  try {

    log("=== LOOKUP LOCAL ===");

    let product = findDrugByCip(code);
    const cis = cipMap[code];

    // 1. CACHE fallback
    if (!product) {

      try {

        const res = await fetch(
          BASE_URL +
          "?action=lookupCache&cip=" +
          encodeURIComponent(code)
        );

        const json = await res.json();

        if (json.found) {
          product = json.product;
        }

      } catch (e) {
        log("CACHE ERROR", e);
      }
    }

    // 2. VIDAL fallback
    if (!product) {

      try {

        log("LOOKUP VIDAL");

        const res = await fetch(
          BASE_URL +
          "?action=lookupVidal&cip=" +
          encodeURIComponent(code)
        );

        const json = await res.json();

        log("VIDAL RESPONSE", json);

        if (json.found) {
          product = json.product;
        }

      } catch (e) {
        log("VIDAL ERROR", e);
      }
    }

    // 3. final UI
    const shortName00 =
      product
        ? product.split(",")[0].trim()
        : "";
    
    const shortName =
      product.replace(/,\s[^,]+$/, "");

    if (shortName) {
      document.getElementById("product").value = shortName;
    }

    if (productExpired) {
    
      elStatus.textContent =
        "⛔ Produit périmé";
    
    } else {
    
      elStatus.textContent =
        shortName
          ? "Produit trouvé"
          : "Produit inconnu";
    }

    log("FINAL RESULT", {
      cip: code,
      cis,
      product: shortName
    });

  } catch (err) {

    log("ERROR LOOKUP", err);
    elStatus.textContent = "Erreur scan";
  }
}
  
function fill(name) {
  document.getElementById("product").value = name;
  elStatus.textContent = "OK produit chargé";
}

async function save() {

  try {

    const productInput =
      document.getElementById("product").value.trim();

    const comment =
      document.getElementById("comment").value.trim();

    const dates =
      [...document.querySelectorAll(".date")]
        .map(x => x.value)
        .filter(Boolean);

    // 1. SAVE fiche mois-année (inchangé)
    const payload = new URLSearchParams({
      action: "save",
      product: productInput,
      comment,
      cip13: scannedCode,
      dates: JSON.stringify(dates)
    });

    const url = BASE_URL + "?" + payload.toString();

    log("SAVE URL", url);

    const res = await fetch(url);
    const json = await res.json();

    log("SAVE RESULT", json);

    // 2. SAVE CACHE (nouveau point central)
    const cacheRes = await fetch(
      BASE_URL +
      "?action=saveCache" +
      "&cip=" + encodeURIComponent(scannedCode) +
      "&cis=" + encodeURIComponent(cipMap[scannedCode] || "") +
      "&product=" + encodeURIComponent(productInput)
    );

    const cacheJson = await cacheRes.json();
    log("CACHE RESULT", cacheJson);

    elStatus.textContent =
      json.success
        ? "Produit enregistré"
        : "Erreur enregistrement";

  } catch (err) {

    log("ERROR SAVE", err);
    elStatus.textContent = "Erreur";
  }
}

function json(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}

</script>
