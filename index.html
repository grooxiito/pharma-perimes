<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>Gestion périmés pharmacie</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 24px;
    }

    button {
      width: 100%;
      padding: 18px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: #1976d2;
      color: white;
      font-size: 18px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    .date-row {
      margin-top: 10px;
    }

    video {
      width: 100%;
      margin-top: 15px;
      border-radius: 12px;
      background: black;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Gestion périmés</h1>

<button id="scanBtn">
  Scanner produit
</button>

<video id="video"
       autoplay
       playsinline>
</video>

<input id="product"
       placeholder="Nom produit">

<input id="comment"
       placeholder="Commentaire / labo">

<div id="dates"></div>

<button id="addDateBtn">
  + Ajouter une date
</button>

<button id="saveBtn">
  Enregistrer
</button>

<div id="status"></div>

<script>

let stream = null;
let scannedCode = "";

const statusEl = document.getElementById("status");
const video = document.getElementById("video");

document
  .getElementById("scanBtn")
  .addEventListener("click", startScanner);

document
  .getElementById("addDateBtn")
  .addEventListener("click", addDateField);

document
  .getElementById("saveBtn")
  .addEventListener("click", saveProduct);

function addDateField(value = "") {

  const div = document.createElement("div");

  div.className = "date-row";

  div.innerHTML = `
    <input class="date"
           placeholder="MM-YYYY"
           value="${value}">
  `;

  document
    .getElementById("dates")
    .appendChild(div);
}

addDateField();

async function startScanner() {

  try {

    statusEl.innerText =
      "Demande autorisation caméra...";

    stream =
      await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: {
            ideal: "environment"
          }
        }
      });

    video.srcObject = stream;

    statusEl.innerText =
      "Caméra active";

    if (!("BarcodeDetector" in window)) {

      statusEl.innerText =
        "BarcodeDetector non supporté";

      return;
    }

    const detector =
      new BarcodeDetector({
        formats: [
          "ean_13",
          "qr_code",
          "data_matrix"
        ]
      });

    scanLoop(detector);

  } catch (err) {

    console.error(err);

    statusEl.innerText =
      "Erreur caméra : " + err.message;
  }
}

async function scanLoop(detector) {

  const interval = setInterval(async () => {

    try {

      const codes = await detector.detect(video);

      if (codes.length > 0) {

        const raw = codes[0].rawValue;
        const format = codes[0].format || "unknown";

        scannedCode = raw;

        statusEl.innerText =
          "🔍 DETECTÉ\n" +
          "Format : " + format + "\n" +
          "Code : " + raw;

        console.log("SCAN DEBUG", {
          raw,
          format
        });

        stopScanner();
        clearInterval(interval);

        loadCachedProduct(scannedCode);
      }

    } catch (e) {

      statusEl.innerText =
        "Erreur scan : " + e.message;
    }

  }, 500);
}

function stopScanner() {

  if (stream) {

    stream
      .getTracks()
      .forEach(track => track.stop());
  }
}

async function loadCachedProduct(code) {

  statusEl.innerText =
    "📡 Recherche produit...\nCode: " + code;

  const url =
    "https://script.google.com/macros/s/TON_ID/exec?action=lookup&code=" +
    encodeURIComponent(code);

  console.log("API CALL :", url);

  try {

    const response = await fetch(url);
    const data = await response.json();

    console.log("API RESPONSE :", data);

    statusEl.innerText =
      "📡 Réponse API :\n" +
      JSON.stringify(data, null, 2);

    if (data.found) {

      document.getElementById("product").value =
        data.product || "";

      document.getElementById("comment").value =
        data.comment || "";

    } else {

      statusEl.innerText +=
        "\n\n❌ Produit inconnu";
    }

  } catch (err) {

    console.error(err);

    statusEl.innerText =
      "❌ Erreur API : " + err.message;
  }
}

function saveProduct() {

  const dates =
    Array
      .from(document.querySelectorAll(".date"))
      .map(el => el.value)
      .filter(Boolean);

  const payload = {

    code: scannedCode,

    product:
      document
        .getElementById("product")
        .value,

    comment:
      document
        .getElementById("comment")
        .value,

    dates
  };

  console.log(payload);

  statusEl.innerText =
    "Produit prêt à envoyer";
}

</script>

</body>
</html>
