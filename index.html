<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestion périmés</title>

<style>
body {
  font-family: Arial;
  max-width: 520px;
  margin: auto;
  padding: 16px;
  background: #f5f5f5;
}

h1 {
  font-size: 22px;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #1976d2;
  color: white;
  font-size: 16px;
}

input {
  width: 90%;
  padding: 16px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

video {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
  background: black;
}

#status {
  margin-top: 12px;
  font-weight: bold;
}

#debug {
  background: #111;
  color: #0f0;
  font-size: 11px;
  padding: 10px;
  margin-top: 15px;
  height: 200px;
  overflow: auto;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>📦 Gestion périmés</h1>

<button id="scanBtn">Scanner produit</button>

<video id="video" autoplay playsinline></video>

<input id="product" placeholder="Nom produit">
<input id="comment" placeholder="Commentaire">

<div id="dates"></div>

<button id="addDate">+ Ajouter date</button>
<button id="saveBtn">Enregistrer</button>

<div id="status"></div>
<pre id="debug"></pre>

<script>

// url Apps Script à changer à chaque déploiement
const BASE_URL = "https://script.google.com/macros/s/AKfycbxb5UjFaHPPHjes_jy7SFMhGGC6tuy9CXA2TtM9L3nZIfQXhjO-EyGDixDEgv7a1rin/exec";

let cisMap = {};
let cipMap = {};

let stream;
let scannedCode = "";

const elStatus = document.getElementById("status");
const elDebug = document.getElementById("debug");

function log(...a) {
  elDebug.textContent += "\n" + a.map(x =>
    typeof x === "object" ? JSON.stringify(x) : x
  ).join(" ");
}

async function loadBdpm() {

  log("Chargement BDPM...");

  // fichier présentations
  const cipTxt =
    await fetch("CIS_CIP_bdpm.txt")
      .then(r => r.text());

  // fichier spécialités
  const cisTxt =
    await fetch("CIS_bdpm.txt")
      .then(r => r.text());

  // CIP13 -> CIS
  cipTxt.split("\n").forEach(line => {

    const cols = line.trim().split("\t");

    if (cols.length < 7) return;

    const cis = cols[0];
    const cip13 = cols[6];

    cipMap[cip13] = cis;
  });

  // CIS -> DENOMINATION
  cisTxt.split("\n").forEach(line => {

    const cols = line.trim().split("\t");

    if (cols.length < 2) return;

    const cis = cols[0];
    const denomination = cols[1];

    cisMap[cis] = denomination;
  });

  log("CIP chargés :", Object.keys(cipMap).length);
  log("CIS chargés :", Object.keys(cisMap).length);
}

document.getElementById("scanBtn").onclick = startScan;
document.getElementById("addDate").onclick = () => addDate();
document.getElementById("saveBtn").onclick = save;

loadBdpm();

function resetForm() {

  document.getElementById("product").value = "";
  document.getElementById("comment").value = "";

  document.getElementById("dates").innerHTML = "";
}

function findDrugByCip(cip13) {

  log("Recherche CIP13 :", cip13);

  const cis = cipMap[cip13];

  log("CIS trouvé :", cis);

  if (!cis) {
    return null;
  }

  const denomination = cisMap[cis];

  log("Dénomination :", denomination);

  return denomination || null;
}

function addDate(value = "") {
  const d = document.createElement("input");
  d.className = "date";
  d.placeholder = "MM-YYYY";
  d.value = value;
  document.getElementById("dates").appendChild(d);
}

async function startScan() {

  elStatus.textContent = "Autorisation caméra...";

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  document.getElementById("video").srcObject = stream;

  const detector = new BarcodeDetector({
    formats: ["ean_13", "data_matrix", "qr_code"]
  });

  elStatus.textContent = "Scan actif";

  const interval = setInterval(async () => {

    const codes = await detector.detect(document.getElementById("video"));

    if (!codes.length) return;

    clearInterval(interval);
    stop();
    resetForm();

    const raw = codes[0].rawValue;

    const expiryMatch =
      raw.match(/17(\d{6})/);
    
    if (expiryMatch) {
    
      const expiry = expiryMatch[1];
    
      const yy = expiry.substring(0,2);
      const mm = expiry.substring(2,4);
    
      document.getElementById("dates").innerHTML = "";

      addDate(mm + "-20" + yy);
    
      log("EXPIRY :", expiry);
    }

    log("RAW", raw);

    const gtin = extractGTIN(raw);
    const cip13 = gtin?.startsWith("0") ? gtin.slice(1) : gtin;

    scannedCode = cip13;

    elStatus.textContent =
      "Code détecté: " + cip13;

    await lookup(cip13);
  }, 400);
}

function stop() {
  stream?.getTracks().forEach(t => t.stop());
}

function extractGTIN(raw) {
  const m = raw.match(/01(\d{14})/);
  return m ? m[1] : raw;
}

async function lookup(code) {

  try {

    log("=== LOOKUP LOCAL ===");

    const product = findDrugByCip(code);
    const cis = cipMap[code];

    const manualName = document.getElementById("product").value.trim();

    const shortName =
      manualName ||
      (product ? product.split(",")[0].trim() : "EAN13_UNKNOWN");

    if (product) {

      document.getElementById("product").value = shortName;
      elStatus.textContent = "Produit trouvé BDPM";

    } else {

      elStatus.textContent = "Produit inconnu";
    }

    log("SAVE CACHE", {
      cip: code,
      cis,
      product: shortName
    });

    const cacheRes = await fetch(
      BASE_URL +
      "?action=saveCache" +
      "&cip=" + encodeURIComponent(code) +
      "&cis=" + encodeURIComponent(cis || "") +
      "&product=" + encodeURIComponent(shortName)
    );

    const cacheJson = await cacheRes.json();
    log("CACHE RESULT", cacheJson);

    return;

  } catch (err) {

    log("ERROR", err);
    elStatus.textContent = "Erreur";
  }
}

function fill(name) {
  document.getElementById("product").value = name;
  elStatus.textContent = "OK produit chargé";
}

async function save() {

  const dates =
    [...document.querySelectorAll(".date")]
      .map(x => x.value)
      .filter(Boolean);

  const payload = new URLSearchParams({
    action: "save",
    product: document.getElementById("product").value,
    comment: document.getElementById("comment").value,
    cip13: scannedCode,
    dates: JSON.stringify(dates)
  });

  const url =
    BASE_URL + "?" + payload.toString();

  log("SAVE URL", url);

  const res = await fetch(url);

  const json = await res.json();

  log("SAVE RESULT", json);

  elStatus.textContent =
    json.success
      ? "Produit enregistré"
      : "Erreur enregistrement";
}

function json(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}

</script>

</body>
</html>
