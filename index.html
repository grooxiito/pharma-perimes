<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>Gestion périmés pharmacie</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 24px;
    }

    button {
      width: 100%;
      padding: 18px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: #1976d2;
      color: white;
      font-size: 18px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    .date-row {
      margin-top: 10px;
    }

    video {
      width: 100%;
      margin-top: 15px;
      border-radius: 12px;
      background: black;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Gestion périmés</h1>

<button id="scanBtn">
  Scanner produit
</button>

<video id="video"
       autoplay
       playsinline>
</video>

<input id="product"
       placeholder="Nom produit">

<input id="comment"
       placeholder="Commentaire / labo">

<div id="dates"></div>

<button id="addDateBtn">
  + Ajouter une date
</button>

<button id="saveBtn">
  Enregistrer
</button>

<pre id="debug" style="background:#111; color:#0f0;padding:10px;margin-top:20px;font-size:12px;white-space:pre-wrap;border-radius:10px;max-height:300px;overflow:auto;"></pre>
  
<div id="status"></div>

<script>

let stream = null;
let scannedCode = "";

const BASE_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnShNUPtuxoDa2Iys-Um8BG2_CHrLpwWj-fVmRiFbJn5L-WHcfUgpyst22dsMIyJfTmYKNWb0L0TcTJfx52I0FA8t4rNZ8QpXTzV4Vo1wvAEsRfDEG7DK4Nz5tX-rVYKwbhlB6xC8bWJa1ctP3-AqjTEFF8Jq-I2o0rma980-EvHR_JePe7MzOEcLiPeK3BhGYLJ6UGLSd3ak_xLmlUNfDpD17nF1iZp3FIpr1inxFralw3XPymMsJxzrPmS312We0UqrhHUuTCXDO-o6Oc8zjnuekeDEitF0H0DVtoY2Pm-Fyode2yjc4LzNn2sWA&lib=Mw3156psM5NRjIHhqxUSdNxHkt4HNAJN7";
const statusEl = document.getElementById("status");
const video = document.getElementById("video");

document
  .getElementById("scanBtn")
  .addEventListener("click", startScanner);

document
  .getElementById("addDateBtn")
  .addEventListener("click", addDateField);

document
  .getElementById("saveBtn")
  .addEventListener("click", saveProduct);

function debugLog(...args) {

  const el = document.getElementById("debug");

  const text = args
    .map(a =>
      typeof a === "object"
        ? JSON.stringify(a, null, 2)
        : String(a)
    )
    .join(" ");

  console.log(text);

  el.textContent += "\n" + text;

  el.scrollTop = el.scrollHeight;
} 
  
function addDateField(value = "") {

  const div = document.createElement("div");

  div.className = "date-row";

  div.innerHTML = `
    <input class="date"
           placeholder="MM-YYYY"
           value="${value}">
  `;

  document
    .getElementById("dates")
    .appendChild(div);
}

addDateField();

async function startScanner() {

  try {

    statusEl.innerText =
      "Demande autorisation caméra...";

    stream =
      await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: {
            ideal: "environment"
          }
        }
      });

    video.srcObject = stream;

    statusEl.innerText =
      "Caméra active";

    if (!("BarcodeDetector" in window)) {

      statusEl.innerText =
        "BarcodeDetector non supporté";

      return;
    }

    const detector =
      new BarcodeDetector({
        formats: [
          "ean_13",
          "qr_code",
          "data_matrix"
        ]
      });

    scanLoop(detector);

  } catch (err) {

    console.error(err);

    statusEl.innerText =
      "Erreur caméra : " + err.message;
  }
}

async function scanLoop(detector) {

  const interval = setInterval(async () => {

    try {

      const codes = await detector.detect(video);

      if (codes.length > 0) {

        const raw = codes[0].rawValue;
        const format = codes[0].format || "unknown";

        const parsed = parseDataMatrix(raw);

        const gtin = parsed.gtin;
        const cip13 = gtin && gtin.startsWith("0")
          ? gtin.substring(1)
          : gtin;

        debugLog("RAW:", raw);
        debugLog("PARSED:", parsed);
        debugLog("GTIN:", gtin);
        debugLog("CIP13:", cip13);

        // STOP SCAN
        clearInterval(interval);
        stopScanner();

        scannedCode = cip13 || gtin;

        statusEl.innerText =
          "🔍 CODE DÉTECTÉ\n\n" +
          "GTIN : " + gtin + "\n" +
          "CIP13 : " + cip13 + "\n" +
          "Expiry : " + (parsed.expiry || "N/A") + "\n\n" +
          "📡 Recherche produit...";

        loadCachedProduct({
          gtin: gtin,
          cip13: cip13
        });
      }

    } catch (e) {

      statusEl.innerText =
        "Erreur scan : " + e.message;
    }

  }, 500);
}

function stopScanner() {

  if (stream) {

    stream
      .getTracks()
      .forEach(track => track.stop());
  }
}

function parseDataMatrix(raw) {

  let gtin = null;
  let expiry = null;
  let lot = null;

  let i = 0;

  while (i < raw.length) {

    const ai = raw.substring(i, i + 2);

    // GTIN
    if (ai === "01") {
      gtin = raw.substring(i + 2, i + 16);
      i += 16;
      continue;
    }

    // EXPIRY
    if (ai === "17") {
      expiry = raw.substring(i + 2, i + 8);
      i += 8;
      continue;
    }

    // LOT (corrigé proprement)
    if (ai === "10") {

      let start = i + 2;
      let j = start;

      while (j < raw.length) {

        const nextAI = raw.substring(j, j + 2);

        if (nextAI === "17" || nextAI === "01" || nextAI === "21") {
          break;
        }

        j++;
      }

      lot = raw.substring(start, j);
      i = j;
      continue;
    }

    i++;
  }

  return { gtin, expiry, lot };
}

async function loadCachedProduct(data) {

  try {

    const code = data.cip13 || data.gtin;

    debugLog("=== LOOKUP START ===");
    debugLog("SEARCH CODE:", code);

    // URL lookup cache
    const lookupUrl = BASE_URL + "&action=lookup&code=" + encodeURIComponent(code);

    debugLog("LOOKUP URL:", lookupUrl);

    const response = await fetch(lookupUrl);

    debugLog("LOOKUP STATUS:", response.status);

    const text = await response.text();
    debugLog("RAW RESPONSE:", text);
    
    const result = JSON.parse(text);

    debugLog("LOOKUP RESULT:", result);

    // CACHE HIT
    if (result && result.found) {

      debugLog("CACHE FOUND");

      document.getElementById("product").value =
        result.product || "";

      document.getElementById("comment").value =
        result.comment || "";

      if (data.expiry) {
        fillExpiry(data.expiry);
      }

      statusEl.innerText =
        "Produit trouvé cache";

      return;
    }

    // VIDAL FALLBACK
    debugLog("CACHE MISS -> VIDAL");

    const vidalUrl = BASE_URL + "&action=vidal&code=" + encodeURIComponent(code);

    debugLog("VIDAL URL:", vidalUrl);

    const vidalRes = await fetch(vidalUrl);

    debugLog("VIDAL STATUS:", vidalRes.status);

    const vidalData = await vidalRes.json();

    debugLog("VIDAL RESULT:", vidalData);

    if (vidalData && vidalData.found) {

      document.getElementById("product").value =
        vidalData.product || "";

      if (data.expiry) {
        fillExpiry(data.expiry);
      }

      statusEl.innerText =
        "Produit trouvé Vidal";

      debugLog("PRODUCT:", vidalData.product);

      return;
    }

    debugLog("NOT FOUND ANYWHERE");

    statusEl.innerText =
      "Produit inconnu";

  } catch (err) {

    debugLog("FETCH ERROR:", err);

    statusEl.innerText =
      "Erreur de recherche : " + err.message;
  }
}

function fillExpiry(expiry) {

  // format GS1 : YYMMDD
  const yy = expiry.substring(0,2);
  const mm = expiry.substring(2,4);

  const year = "20" + yy;

  addDateField(mm + "-" + year);
}

function saveProduct() {

  const dates =
    Array
      .from(document.querySelectorAll(".date"))
      .map(el => el.value)
      .filter(Boolean);

  const payload = {

    code: scannedCode,

    product:
      document
        .getElementById("product")
        .value,

    comment:
      document
        .getElementById("comment")
        .value,

    dates
  };

  console.log(payload);

  statusEl.innerText =
    "Produit prêt à envoyer";
}

</script>

</body>
</html>
